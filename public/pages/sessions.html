<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sessions - InterviewMyCandidate</title>
<link rel="stylesheet" href="/css/main.css">
<style>
.se-wrap{max-width:1000px;margin:0 auto;padding:26px 20px}
.se-h{font-size:22px;font-weight:800;color:var(--navy);margin:0 0 4px;letter-spacing:-.3px}
.se-sub{font-size:13px;color:var(--text3);margin-bottom:16px}
.se-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:9px;background:var(--white);box-shadow:0 -2px 0 0 var(--blue) inset}
.se-name{font-weight:700;color:var(--navy)}
.se-meta{font-size:12px;color:var(--text3);margin-top:2px}
.se-badge{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:999px;border:1.5px solid;margin-left:8px}
.se-status{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
</style></head><body>
<nav class="nav">
  <a href="/" class="nav-logo" aria-label="Home"><span class="logo-interview">Interview</span><span class="logo-my">My</span><span class="logo-candidate">Candidate</span></a>
  <div class="nav-right">
    <span id="user-chip" style="font-size:12px;color:rgba(255,255,255,.5)"></span>
    <div class="topbar-sep"></div>
    <button class="burger-btn" id="burger-btn" aria-label="Open menu" aria-expanded="false"><span class="burger-line"></span><span class="burger-line"></span><span class="burger-line"></span></button>
  </div>
</nav>
<div class="nav-drawer" id="nav-drawer">
  <div class="nav-drawer-bg" id="drawer-bg"></div>
  <div class="nav-drawer-panel">
    <div class="nav-drawer-header"><span class="nav-drawer-title">Navigation</span><button class="nav-drawer-close" id="drawer-close">X</button></div>
    <nav class="nav-drawer-links" id="drawer-links"></nav>
  </div>
</div>
<div class="se-wrap">
  <h1 class="se-h" id="se-title">Sessions</h1>
  <div class="se-sub" id="se-sub">Completed interviews, live and one-way together.</div>
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <button id="se-completed" class="btn btn-primary btn-sm">Completed</button>
    <button id="se-upcoming" class="btn btn-outline btn-sm">Upcoming and open</button>
  </div>
  <div id="se-list"></div>
</div>
<script src="/js/utils.js"></script>
<script>
(function(){
var $=function(id){return document.getElementById(id);};
var scope="completed";
var drawer=$("nav-drawer");
function tg(){ drawer.classList.toggle("open"); }
if($("burger-btn")) $("burger-btn").onclick=tg;
if($("drawer-close")) $("drawer-close").onclick=tg;
if($("drawer-bg")) $("drawer-bg").onclick=tg;
function when(ts,type,st){ if(!ts) return ""; var d=new Date(ts*1000).toLocaleDateString(); if(scope==="completed") return d; return (type==="oneway")?("expires "+d):("scheduled "+d); }
function badge(type){ var ow=(type==="oneway"); var c=ow?"var(--blue)":"var(--text3)"; var b=document.createElement("span"); b.className="se-badge"; b.style.borderColor=c; b.style.color=c; b.textContent=ow?"One-way":"Live"; return b; }
function statusColor(st){ if(/expired/i.test(st)) return "var(--red)"; if(/started|active/i.test(st)) return "var(--amber)"; if(/completed/i.test(st)) return "var(--green)"; return "var(--text3)"; }
function load(){
  $("se-completed").className="btn btn-sm "+(scope==="completed"?"btn-primary":"btn-outline");
  $("se-upcoming").className="btn btn-sm "+(scope==="upcoming"?"btn-primary":"btn-outline");
  $("se-sub").textContent=(scope==="completed")?"Completed interviews, live and one-way together.":"Scheduled live sessions and one-way interviews still open.";
  var box=$("se-list"); box.textContent="Loading...";
  fetch("/api/interviews?scope="+scope).then(function(r){ if(r.status===401){ location.href="/"; return null; } return r.json(); }).then(function(rows){
    if(!rows) return;
    box.innerHTML="";
    if(!rows.length){ box.innerHTML="<div style=\"font-size:13px;color:var(--text3)\">Nothing here yet.</div>"; return; }
    rows.forEach(function(it){
      var row=document.createElement("div"); row.className="se-row";
      var left=document.createElement("div");
      var nm=document.createElement("div"); nm.className="se-name"; nm.textContent=it.candidate_name||"Candidate"; nm.appendChild(badge(it.type));
      var mt=document.createElement("div"); mt.className="se-meta";
      var bits=[it.title||""];
      if(it.progress) bits.push(it.progress+" answered");
      if(it.duration) bits.push(Math.round(it.duration/60)+" min");
      var w=when(it.when,it.type,it.status); if(w) bits.push(w);
      mt.textContent=bits.filter(Boolean).join("  |  ");
      left.appendChild(nm); left.appendChild(mt);
      var right=document.createElement("div"); right.style.cssText="display:flex;align-items:center;gap:10px";
      var st=document.createElement("span"); st.className="se-status"; st.style.color=statusColor(it.status||""); st.textContent=it.status||"";
      var go=document.createElement("a"); go.className="btn btn-outline btn-sm";
      if(scope==="completed"){ go.href="/recordings"; go.textContent="View recording"; }
      else { go.href=(it.type==="oneway")?"/async":"/live"; go.textContent=(it.type==="oneway")?"Go to invite":"Go to session"; }
      right.appendChild(st); right.appendChild(go);
      row.appendChild(left); row.appendChild(right); box.appendChild(row);
    });
  }).catch(function(){ box.textContent="Could not load sessions."; });
}
$("se-completed").onclick=function(){ scope="completed"; load(); };
$("se-upcoming").onclick=function(){ scope="upcoming"; load(); };
load();
})();
</script></body></html>
