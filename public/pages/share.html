<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interview Recording - Secure Interview</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;flex-direction:column}
.header{padding:16px 24px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:12px}
.logo{font-size:15px;font-weight:700}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid}
.badge-green{color:#3fb950;border-color:#3fb950;background:rgba(63,185,80,.1)}
.badge-amber{color:#e3b341;border-color:#e3b341;background:rgba(227,179,65,.1)}
.badge-red{color:#f85149;border-color:#f85149;background:rgba(248,81,73,.1)}
.main{flex:1;max-width:900px;margin:0 auto;padding:32px 24px;width:100%}
.rec-title{font-size:22px;font-weight:700;margin-bottom:6px}
.rec-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:13px;color:#8b949e;margin-bottom:24px}
.meta-item{display:flex;align-items:center;gap:5px}
video{width:100%;border-radius:10px;background:#000;display:block;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.video-wrap{position:relative}
.dl-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:6px;background:#58a6ff;border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;text-decoration:none}
.dl-btn:hover{filter:brightness(1.1)}
.error{text-align:center;padding:80px 24px;color:#8b949e}
.error h2{font-size:20px;margin-bottom:8px;color:#e6edf3}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:24px}
.stat{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center}
.stat-val{font-size:24px;font-weight:800;margin-bottom:4px}
.stat-label{font-size:11px;color:#8b949e;letter-spacing:.5px;text-transform:uppercase}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Secure Interview</div>
  <span style="font-size:12px;color:#8b949e">Shared Recording</span>
</div>
<div class="main" id="main">
  <div class="error"><h2>Loading recording...</h2></div>
</div>
<script>
var token = location.pathname.split('/').pop();

function fmt(ts){ if(!ts)return'-'; return new Date(ts*1000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function fmtDur(s){ if(!s)return'-'; return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function fmtSize(b){ if(!b)return''; if(b<1048576)return(b/1024).toFixed(1)+' KB'; return(b/1048576).toFixed(1)+' MB'; }

async function init() {
  var res = await fetch('/api/recordings/share/' + token + '/info');
  if (!res.ok) { document.getElementById('main').innerHTML = '<div class="error"><h2>Recording not found</h2><p>This link may have expired or been deleted.</p></div>'; return; }
  var rec = await res.json();
  if (rec.error) { document.getElementById('main').innerHTML = '<div class="error"><h2>Recording not found</h2><p>' + rec.error + '</p></div>'; return; }

  var score = rec.trust_score || 100;
  var scoreClass = score >= 80 ? 'badge-green' : score >= 60 ? 'badge-amber' : 'badge-red';

  document.getElementById('main').innerHTML =
    '<div class="rec-title">' + rec.session_title + '</div>'
    + '<div class="rec-meta">'
    + '<span class="meta-item">Candidate: <strong>' + (rec.candidate_name||'N/A') + '</strong></span>'
    + '<span class="meta-item">Recorded: ' + fmt(rec.created_at) + '</span>'
    + '<span class="meta-item">Duration: ' + fmtDur(rec.duration_secs) + '</span>'
    + '</div>'
    + '<div class="video-wrap">'
    + '<video controls preload="metadata" src="/api/recordings/share/' + token + '/stream"></video>'
    + '</div>'
    + '<a class="dl-btn" href="/api/recordings/share/' + token + '/stream" download="interview-' + rec.session_title.replace(/[^a-z0-9]/gi,'-').toLowerCase() + '.webm">Download Recording</a>'
    + '<div class="stats">'
    + '<div class="stat"><div class="stat-val ' + scoreClass + '">' + score + '%</div><div class="stat-label">Trust Score</div></div>'
    + '<div class="stat"><div class="stat-val">' + (rec.flag_count||0) + '</div><div class="stat-label">Flags</div></div>'
    + '<div class="stat"><div class="stat-val">' + fmtDur(rec.duration_secs) + '</div><div class="stat-label">Duration</div></div>'
    + '</div>';
}
init();
</script>
</body>
</html>
