<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard - Secure Interview</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">&#127737; Secure Interview</div>
  <div class="topbar-right">
    <span id="user-name" style="font-size:12px;color:var(--text2)"></span>
    <button class="btn" onclick="doLogout()">Sign out</button>
  </div>
</div>
<div class="page-wrap">
  <div class="page-hdr">
    <div>
      <h1 id="welcome-msg">Dashboard</h1>
      <div style="font-size:12px;color:var(--text2);margin-top:2px" id="org-name"></div>
    </div>
    <button class="btn btn-primary" id="new-sess-btn">+ New session</button>
  </div>
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('sessions',this)">Sessions</button>
    <button class="tab-btn" onclick="switchTab('team',this)">Team</button>
  </div>
  <div id="tab-sessions" class="tab-panel active"><div id="sessions-list"></div></div>
  <div id="tab-team" class="tab-panel">
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <button class="btn btn-primary" id="create-team-btn">+ Create team</button>
      <button class="btn" id="join-team-btn">Join with code</button>
    </div>
    <div id="teams-list"></div>
  </div>
</div>

<!-- New Session Modal -->
<div id="ov-new-session" style="display:none">
  <div class="modal-inner">
    <button class="modal-x" onclick="hideModal('ov-new-session')">&#10005;</button>
    <h3>New interview session</h3>
    <label class="label">Session title *</label>
    <input class="input" id="ns-title" placeholder="e.g. Senior Engineer Interview">
    <label class="label">Candidate name</label>
    <input class="input" id="ns-candidate" placeholder="e.g. Jane Smith">
    <label class="label">Interview questions (one per line, optional)</label>
    <textarea class="input" id="ns-questions" placeholder="Tell me about yourself&#10;What is your biggest strength?&#10;Describe a challenge you overcame"></textarea>
    <label class="label">Team (optional)</label>
    <select class="input" id="ns-team"><option value="">No team</option></select>
    <div id="ns-err" class="err" style="display:none;margin-bottom:10px"></div>
    <div class="modal-footer">
      <button class="btn" onclick="hideModal('ov-new-session')">Cancel</button>
      <button class="btn btn-primary" id="ns-btn" onclick="createSession()">Create &amp; open</button>
    </div>
  </div>
</div>

<!-- Create Team Modal -->
<div id="ov-create-team" style="display:none">
  <div class="modal-inner">
    <button class="modal-x" onclick="hideModal('ov-create-team')">&#10005;</button>
    <h3>Create team</h3>
    <label class="label">Team name</label>
    <input class="input" id="ct-name" placeholder="e.g. Engineering Hiring">
    <div id="ct-err" class="err" style="display:none;margin-bottom:10px"></div>
    <div class="modal-footer">
      <button class="btn" onclick="hideModal('ov-create-team')">Cancel</button>
      <button class="btn btn-primary" onclick="createTeam()">Create</button>
    </div>
  </div>
</div>

<!-- Join Team Modal -->
<div id="ov-join-team" style="display:none">
  <div class="modal-inner">
    <button class="modal-x" onclick="hideModal('ov-join-team')">&#10005;</button>
    <h3>Join team</h3>
    <label class="label">Invite code</label>
    <input class="input" id="jt-code" placeholder="e.g. AB12CD34" style="font-family:monospace;text-transform:uppercase">
    <div id="jt-err" class="err" style="display:none;margin-bottom:10px"></div>
    <div class="modal-footer">
      <button class="btn" onclick="hideModal('ov-join-team')">Cancel</button>
      <button class="btn btn-primary" onclick="joinTeam()">Join</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/utils.js"></script>
<script>
let teams=[];

// Wire buttons after DOM ready
document.getElementById('new-sess-btn').onclick=()=>showModal('ov-new-session');
document.getElementById('create-team-btn').onclick=()=>showModal('ov-create-team');
document.getElementById('join-team-btn').onclick=()=>showModal('ov-join-team');

// Close on backdrop click
['ov-new-session','ov-create-team','ov-join-team'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)hideModal(id);});
});

function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

async function init(){
  const me=await requireLogin('/');
  if(!me)return;
  document.getElementById('user-name').textContent=me.name;
  document.getElementById('welcome-msg').textContent='Welcome, '+me.name.split(' ')[0];
  document.getElementById('org-name').textContent=me.org;
  await Promise.all([loadSessions(),loadTeams()]);
}

async function loadSessions(){
  const sessions=await get('/api/sessions');
  const el=document.getElementById('sessions-list');
  if(!sessions||!sessions.length){el.innerHTML='<div class="empty">No sessions yet. Create your first session to get started.</div>';return;}
  el.innerHTML=sessions.map(s=>{
    const score=s.trust_score!=null?s.trust_score:100;
    const col=score>=80?'var(--green)':score>=60?'var(--amber)':'var(--red)';
    const badge=s.status==='active'?'<span class="badge badge-green">Live</span>':s.status==='ended'?'<span class="badge">Ended</span>':'<span class="badge badge-amber">Waiting</span>';
    return '<div class="session-row" onclick="window.location.href='/session/'+s.id+''"><div><div class="sr-title">'+s.title+'</div><div class="sr-meta">'+(s.candidate_name||'Candidate')+' &middot; '+fmtDate(s.created_at)+'</div></div><div class="sr-right"><span style="font-size:13px;font-weight:700;color:'+col+'">'+score+'%</span>'+badge+'</div></div>';
  }).join('');
}

async function loadTeams(){
  teams=await get('/api/teams');
  const sel=document.getElementById('ns-team');
  sel.innerHTML='<option value="">No team</option>'+(teams||[]).map(t=>'<option value="'+t.id+'">'+t.name+'</option>').join('');
  const el=document.getElementById('teams-list');
  if(!teams||!teams.length){el.innerHTML='<div class="empty">No teams yet.</div>';return;}
  el.innerHTML=(teams||[]).map(t=>'<div class="team-card"><div class="team-hdr"><div><div style="font-size:14px;font-weight:600">'+t.name+'</div><div style="font-size:12px;color:var(--text2)">'+(t.members||[]).length+' member'+((t.members||[]).length!==1?'s':'')+'</div></div><span class="invite-code" onclick="navigator.clipboard.writeText(this.textContent).then(()=>toast('Code copied!','green'))" title="Click to copy">'+t.invite_code+'</span></div>'+(t.members||[]).map(m=>'<div class="member-row"><div class="avatar">'+m.name.slice(0,2).toUpperCase()+'</div><div><div style="font-size:13px;font-weight:500">'+m.name+'</div><div style="font-size:11px;color:var(--text2)">'+m.email+'</div></div><span class="badge" style="margin-left:auto">'+m.role+'</span></div>').join('')+'</div>').join('');
}

async function createSession(){
  const title=document.getElementById('ns-title').value.trim();
  const candidate=document.getElementById('ns-candidate').value.trim();
  const qText=document.getElementById('ns-questions').value.trim();
  const teamId=document.getElementById('ns-team').value;
  const questions=qText?qText.split('\n').map(q=>q.trim()).filter(Boolean):[];
  const err=document.getElementById('ns-err');
  err.style.display='none';
  if(!title){err.textContent='Session title is required';err.style.display='block';return;}
  const btn=document.getElementById('ns-btn');
  btn.disabled=true;btn.textContent='Creating...';
  const res=await post('/api/sessions',{title,candidateName:candidate||'Candidate',teamId:teamId||null,questions});
  if(res.error){err.textContent=res.error;err.style.display='block';btn.disabled=false;btn.textContent='Create & open';return;}
  window.location.href='/session/'+res.id;
}

async function createTeam(){
  const name=document.getElementById('ct-name').value.trim();
  const err=document.getElementById('ct-err');err.style.display='none';
  if(!name){err.textContent='Team name required';err.style.display='block';return;}
  const res=await post('/api/teams',{name});
  if(res.error){err.textContent=res.error;err.style.display='block';return;}
  toast('Team created! Code: '+res.inviteCode,'green');
  hideModal('ov-create-team');document.getElementById('ct-name').value='';
  await loadTeams();
}

async function joinTeam(){
  const code=document.getElementById('jt-code').value.trim().toUpperCase();
  const err=document.getElementById('jt-err');err.style.display='none';
  if(!code){err.textContent='Enter an invite code';err.style.display='block';return;}
  const res=await post('/api/teams/join',{inviteCode:code});
  if(res.error){err.textContent=res.error;err.style.display='block';return;}
  toast('Joined '+res.teamName,'green');
  hideModal('ov-join-team');document.getElementById('jt-code').value='';
  await loadTeams();
}

async function doLogout(){await post('/api/auth/logout');window.location.href='/';}

init();
</script>
</body>
</html>
