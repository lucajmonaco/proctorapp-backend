<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard — Secure Interview</title><link rel="stylesheet" href="/css/main.css"><style>body{display:flex;flex-direction:column;min-height:100vh}.main{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100%}.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.tabs{display:flex;gap:4px;background:var(--bg3);padding:3px;border-radius:var(--radius-sm);margin-bottom:20px}.tab{padding:6px 16px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;border-radius:calc(var(--radius-sm) - 2px);cursor:pointer;transition:all 0.15s}.tab.active{background:var(--bg2);color:var(--text)}.panel{display:none}.panel.active{display:block}.sessions-grid{display:flex;flex-direction:column;gap:8px}.session-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color 0.15s}.session-row:hover{border-color:var(--border2)}.session-title{font-size:14px;font-weight:600;margin-bottom:2px}.session-meta{font-size:11px;color:var(--text2)}.session-actions{margin-left:auto;display:flex;gap:8px;align-items:center}.empty-state{text-align:center;padding:3rem;color:var(--text3)}.empty-icon{font-size:48px;margin-bottom:12px}.team-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px}.team-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}.member-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}.member-row:last-child{border-bottom:none}.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--blue);flex-shrink:0}.invite-code-box{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 12px;font-family:monospace;font-size:13px;color:var(--green);letter-spacing:0.05em}</style></head><body><div class="topbar"><div class="topbar-logo"><div class="topbar-logo-icon">🛡️</div>Secure Interview</div><div class="topbar-right"><span style="font-size:12px;color:var(--text2)" id="user-label"></span><button class="btn" onclick="doLogout()">Sign out</button></div></div><div class="main"><div class="page-header"><div><h1 id="welcome-title">Dashboard</h1><div style="font-size:13px;color:var(--text2);margin-top:2px" id="org-label"></div></div><button class="btn btn-primary" onclick="openModal('modal-new-session')">+ New session</button></div><div class="tabs"><button class="tab active" onclick="switchTab('sessions')">Sessions</button><button class="tab" onclick="switchTab('team')">Team</button></div><div class="panel active" id="panel-sessions"><div id="sessions-list"></div></div><div class="panel" id="panel-team"><div style="display:flex;gap:10px;margin-bottom:16px"><button class="btn btn-primary" onclick="openModal('modal-create-team')">+ Create team</button><button class="btn" onclick="openModal('modal-join-team')">Join with invite code</button></div><div id="teams-list"></div></div></div><div class="modal-backdrop hidden" id="modal-new-session"><div class="modal"><div class="modal-header"><h3>New interview session</h3><button class="btn" onclick="closeModal('modal-new-session')">✕</button></div><div class="modal-body"><div class="field"><label class="label">Session title</label><input class="input" id="ns-title" placeholder="e.g. Senior Engineer Interview"></div><div class="field"><label class="label">Candidate name</label><input class="input" id="ns-candidate" placeholder="e.g. Jordan M."></div><div class="field"><label class="label">Team (optional)</label><select class="input" id="ns-team"><option value="">No team</option></select></div><div class="error-text hidden" id="ns-error"></div></div><div class="modal-footer"><button class="btn" onclick="closeModal('modal-new-session')">Cancel</button><button class="btn btn-primary" id="ns-btn" onclick="createSession()">Create &amp; open</button></div></div></div><div class="modal-backdrop hidden" id="modal-create-team"><div class="modal"><div class="modal-header"><h3>Create team</h3><button class="btn" onclick="closeModal('modal-create-team')">✕</button></div><div class="modal-body"><div class="field"><label class="label">Team name</label><input class="input" id="ct-name" placeholder="e.g. Engineering Hiring"></div><div class="error-text hidden" id="ct-error"></div></div><div class="modal-footer"><button class="btn" onclick="closeModal('modal-create-team')">Cancel</button><button class="btn btn-primary" onclick="createTeam()">Create team</button></div></div></div><div class="modal-backdrop hidden" id="modal-join-team"><div class="modal"><div class="modal-header"><h3>Join team</h3><button class="btn" onclick="closeModal('modal-join-team')">✕</button></div><div class="modal-body"><div class="field"><label class="label">Invite code</label><input class="input mono" id="jt-code" placeholder="e.g. AB12CD34"></div><div class="error-text hidden" id="jt-error"></div></div><div class="modal-footer"><button class="btn" onclick="closeModal('modal-join-team')">Cancel</button><button class="btn btn-primary" onclick="joinTeam()">Join</button></div></div></div><div id="toast-container"></div><script src="/js/utils.js"></script><script>let me=null,teams=[];async function init(){me=await requireLogin('/');if(!me)return;$('user-label').textContent=me.name;$('welcome-title').textContent='Welcome, '+me.name.split(' ')[0];$('org-label').textContent=me.org;await Promise.all([loadSessions(),loadTeams()]);}async function loadSessions(){const sessions=await get('/api/sessions');const list=$('sessions-list');if(!sessions.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div>No sessions yet</div></div>';return;}list.innerHTML='<div class="sessions-grid">'+sessions.map(s=>{const sc=s.trust_score!=null?s.trust_score:100;return`<div class="session-row" onclick="openSession('${s.id}')"><div style="font-size:20px">🎙️</div><div><div class="session-title">${s.title}</div><div class="session-meta">${s.candidate_name||'Candidate'} · ${fmtDate(s.created_at)}</div></div><div class="session-actions"><span class="trust-chip ${trustClass(sc)}">${sc}%</span><span class="badge badge-${s.status==='active'?'green':s.status==='ended'?'gray':'amber'}">${s.status}</span></div></div>`;}).join('')+'</div>';}async function loadTeams(){teams=await get('/api/teams');const sel=$('ns-team');sel.innerHTML='<option value="">No team</option>'+teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');const list=$('teams-list');if(!teams.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div><div>No teams yet</div></div>';return;}list.innerHTML=teams.map(t=>`<div class="team-card"><div class="team-header"><div><div style="font-size:14px;font-weight:600">${t.name}</div><div style="font-size:12px;color:var(--text2)">${t.members.length} member${t.members.length!==1?'s':''}</div></div><div class="invite-code-box" onclick="copyInvite('${t.invite_code}')" title="Click to copy">${t.invite_code}</div></div>${t.members.map(m=>`<div class="member-row"><div class="avatar">${m.name.slice(0,2).toUpperCase()}</div><div><div style="font-size:13px;font-weight:500">${m.name}</div><div style="font-size:11px;color:var(--text2)">${m.email}</div></div><span class="badge badge-gray" style="margin-left:auto">${m.role}</span></div>`).join('')}</div>`).join('');}function switchTab(tab){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['sessions','team'][i]===tab));document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',['sessions','team'][i]===tab));}async function createSession(){const btn=$('ns-btn'),title=$('ns-title').value.trim(),candidate=$('ns-candidate').value.trim(),teamId=$('ns-team').value;if(!title){$('ns-error').textContent='Title required';$('ns-error').classList.remove('hidden');return;}btn.disabled=true;btn.textContent='Creating...';const res=await post('/api/sessions',{title,candidateName:candidate,teamId:teamId||null});if(res.error){$('ns-error').textContent=res.error;$('ns-error').classList.remove('hidden');btn.disabled=false;btn.textContent='Create & open';return;}window.location.href='/session/'+res.id;}function openSession(id){window.location.href='/session/'+id;}async function createTeam(){const name=$('ct-name').value.trim();if(!name){$('ct-error').textContent='Name required';$('ct-error').classList.remove('hidden');return;}const res=await post('/api/teams',{name});if(res.error){$('ct-error').textContent=res.error;$('ct-error').classList.remove('hidden');return;}toast('Team created! Code: '+res.inviteCode,'green');closeModal('modal-create-team');$('ct-name').value='';await loadTeams();}async function joinTeam(){const code=$('jt-code').value.trim().toUpperCase();if(!code){$('jt-error').textContent='Enter code';$('jt-error').classList.remove('hidden');return;}const res=await post('/api/teams/join',{inviteCode:code});if(res.error){$('jt-error').textContent=res.error;$('jt-error').classList.remove('hidden');return;}toast('Joined '+res.teamName,'green');closeModal('modal-join-team');$('jt-code').value='';await loadTeams();}function copyInvite(code){navigator.clipboard.writeText(code).then(()=>toast('Copied!','green'));}async function doLogout(){await post('/api/auth/logout');window.location.href='/';}init();</script></body></html>
